<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control & Console Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1, h2 {
            margin-bottom: 0.5rem;
            color: #00e676;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #76ff03;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            padding: 12px;
            background-color: #00e676;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        #console-output {
            width: 100%;
            height: 250px;
            background-color: #0a0a0a;
            color: #cccccc;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-WARN { color: #ffca28; }
        .log-ERROR { color: #ff5252; }
        .log-INFO { color: #81d4fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Script Execution Panel</h1>
        <textarea id="code" placeholder="-- Paste Lua script here..."></textarea>
        <button onclick="sendScript()">Execute Script</button>
        <p id="status"></p>

        <h2>Live Console Output</h2>
        <div id="console-output">Awaiting console logs...</div>
    </div>

    <script>
        async function sendScript() {
            const code = document.getElementById('code').value;
            const statusText = document.getElementById('status');
            
            if (!code.trim()) return;

            try {
                const response = await fetch('/api/send-script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();
                statusText.innerText = data.success ? 'Script queued!' : 'Failed to queue script.';
            } catch (err) {
                statusText.innerText = 'Error connecting to backend.';
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                
                if (data.logs) {
                    const consoleElement = document.getElementById('console-output');
                    consoleElement.innerHTML = data.logs.map(log => {
                        let className = 'log-INFO';
                        if (log.includes('[WARN]')) className = 'log-WARN';
                        if (log.includes('[ERROR]')) className = 'log-ERROR';
                        return `<div class="${className}">${escapeHtml(log)}</div>`;
                    }).join('');
                    
                    consoleElement.scrollTop = consoleElement.scrollHeight;
                }
            } catch (err) {
                console.error("Log fetch failed", err);
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        setInterval(fetchLogs, 1000);
    </script>
</body>
</html>
